## Core generator configuration
##
## These defaults are intentionally small so local demo runs are fast
## and stay within the PRD’s latency and throughput expectations.
##
## All keys are snake_case to match the architecture conventions.

zone_count: 3
restaurant_count: 50
courier_count: 100

## Logical demand level for docs / UX
demand_level: medium  # one of: low, medium, high

## Approximate events per second across all feeds for the default demo
events_per_second: 50

## Reserved fields for future stories (edge cases, debug mode, samples)
debug_mode_max_events_per_second: 100
debug_mode_max_entity_count: 20
sample_batch_size_per_feed: 500

## Edge case configuration for Story 1.3
##
## Rates are expressed as probabilities in the range [0.0, 1.0].
## A value of 0.0 means the edge case is effectively disabled.
late_event_rate: 0.2
duplicate_rate: 0.1
missing_step_rate: 0.1
impossible_duration_rate: 0.1
courier_offline_rate: 0.1

## Output configuration for Story 1.2
##
## output_base_dir controls where file/sample-mode runs write data by default.
## output_formats controls which formats are produced per feed.
output_base_dir: "samples/generator"
output_formats:
  - json
  - avro

## Azure Event Hubs integration (Story 3.1)
##
## Set the Event Hub names for each feed here, or override via env vars:
##   GENERATOR_EVENT_HUBS_ORDER_TOPIC=order-events
##   GENERATOR_EVENT_HUBS_COURIER_TOPIC=courier-status
##
## The namespace connection string is always read from the environment:
##   EVENTHUB_CONNECTION_STRING=Endpoint=sb://<ns>.servicebus.windows.net/;...
##
event_hubs_order_topic: order-events-g6
event_hubs_courier_topic: courier-status-g6

