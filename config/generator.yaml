## Core generator configuration
##
## These defaults are intentionally small so local demo runs are fast
## and stay within the PRD’s latency and throughput expectations.
##
## All keys are snake_case to match the architecture conventions.

zone_count: 3
restaurant_count: 10
courier_count: 15

## Logical demand level for docs / UX
demand_level: medium  # one of: low, medium, high

## Approximate events per second across all feeds for the default demo
events_per_second: 50

## Reserved fields for future stories (edge cases, debug mode, samples)
debug_mode_max_events_per_second: 100
debug_mode_max_entity_count: 20
sample_batch_size_per_feed: 500

## Output configuration for Story 1.2
##
## output_base_dir controls where file/sample-mode runs write data by default.
## output_formats controls which formats are produced per feed.
output_base_dir: "samples/generator"
output_formats:
  - json
  - avro

