version: 1
project_name: Stream_Analytics_Project
description: >
  Epics and stories for a Python-based real-time analytics pipeline
  for a synthetic food-delivery platform, organized into two course
  milestones. Milestone 1 focuses on streaming feed design and the
  synthetic generator; Milestone 2 focuses on ingestion, processing,
  storage, analytics, and dashboard.

epics:
  - id: M1-E1
    name: Milestone 1 – Streaming Feed Design & Generator
    milestone: 1
    goal: >
      Design two core streaming feeds (Order Events and Courier Status),
      define AVRO schemas, and implement a configurable Python generator
      that outputs realistic JSON and AVRO data with edge cases to
      support later stream processing and analytics.
    stories:
      - id: M1-S1
        title: Set up project structure and dependencies
        description: >
          Create the base repository structure, Python package, and
          dependency management needed for the feed generator and schemas.
        priority: high
        estimate: S
        acceptance_criteria:
          - Root contains README placeholder and project_epics_stories.yaml.
          - Package folder stream_analytics_project exists with __init__.py.
          - Subpackages for generator and schemas are created.
          - requirements.txt created with chosen AVRO library and basics.

      - id: M1-S2
        title: Finalize AVRO schemas for Order Events and Courier Status
        description: >
          Define, review, and freeze the AVRO schemas for the two
          streaming feeds, ensuring they support event-time processing,
          joins, and planned analytics (Delivery Time Anomaly Score and
          Zone Stress Index).
        priority: high
        estimate: S
        depends_on: [M1-S1]
        acceptance_criteria:
          - schemas/order_events.avsc exists and passes basic AVRO validation.
          - schemas/courier_status.avsc exists and passes basic AVRO validation.
          - Schemas include event_time, join keys (order_id, courier_id, zone_id).
          - Optional fields for CX and anomaly analytics are documented.

      - id: M1-S3
        title: Implement generator configuration model
        description: >
          Implement a typed configuration model for the generator,
          including defaults for entity counts, temporal patterns,
          economic parameters, edge case fractions, and output options.
        priority: high
        estimate: S
        depends_on: [M1-S1]
        acceptance_criteria:
          - config.GeneratorConfig dataclass (or equivalent) defined.
          - default_config() returns a sane configuration for local runs.
          - Configuration exposes options for peaks, weekday/weekend, and zone skew.
          - Configuration exposes edge-case controls (late, duplicates, missing steps, impossible durations).

      - id: M1-S4
        title: Implement core synthetic entity universe and distributions
        description: >
          Implement utilities to create synthetic zones, restaurants,
          couriers, and customers, plus realistic temporal and spatial
          distributions (lunch/dinner peaks, weekday/weekend differences,
          zone-level skew).
        priority: high
        estimate: M
        depends_on: [M1-S3]
        acceptance_criteria:
          - Functions exist to generate deterministic lists of entities based on config.
          - Time-of-day functions return demand multipliers (e.g., peaks at lunch/dinner).
          - Weekday vs weekend demand multipliers are implemented.
          - Zone-level multipliers are applied when sampling zones.

      - id: M1-S5
        title: Implement Order Events generator
        description: >
          Implement a generator that produces OrderEvent records with
          realistic distributions over time, zones, and entities,
          leveraging the configuration and distributions.
        priority: high
        estimate: M
        depends_on: [M1-S4]
        acceptance_criteria:
          - Function or class generates a stream/iterator of OrderEvent objects or dicts.
          - Volume, value, and timing patterns roughly follow configured distributions.
          - All required fields for the AVRO schema are populated.
          - Basic unit/smoke test can generate at least a few thousand events without error.

      - id: M1-S6
        title: Implement Courier Status generator
        description: >
          Implement a generator that produces CourierStatusEvent records
          reflecting courier availability, online/offline status, and
          ETAs, aligned with orders where appropriate.
        priority: medium
        estimate: M
        depends_on: [M1-S4]
        acceptance_criteria:
          - Function or class generates a stream/iterator of CourierStatusEvent objects or dicts.
          - Status transitions (ONLINE, OFFLINE, ON_DELIVERY, IDLE) follow reasonable patterns.
          - ETAs and success rates are within realistic ranges.
          - Events reference active_delivery_order_id when courier is on a delivery.

      - id: M1-S7
        title: Implement edge-case injection (late, duplicates, missing steps, impossible durations)
        description: >
          Implement a layer that wraps the base generators to inject
          streaming correctness edge cases, controlled by configuration
          probabilities.
        priority: high
        estimate: M
        depends_on: [M1-S5, M1-S6]
        acceptance_criteria:
          - Late events are produced by intentionally shifting some event_time backwards.
          - Duplicate events are produced with the same event_id/order_id.
          - Missing steps (e.g., ORDER_DELIVERED without ORDER_PICKED_UP) can be triggered via config.
          - Impossible durations (very short/long delivery times) occur at configured fractions.

      - id: M1-S8
        title: Implement JSON and AVRO serialization and file writing
        description: >
          Implement serialization utilities to convert generated events
          to JSON and AVRO, and write them to disk in small batch files
          suitable for ingestion and inspection.
        priority: high
        estimate: S
        depends_on: [M1-S2, M1-S5, M1-S6, M1-S7]
        acceptance_criteria:
          - JSON writer outputs newline-delimited JSON files with valid records.
          - AVRO writer uses the defined schemas and produces valid AVRO files.
          - Output format (json, avro, both) and output path are controlled by config.
          - Sample files are generated under a samples/ path by default.

      - id: M1-S9
        title: Implement CLI runner for generator
        description: >
          Implement a simple CLI entrypoint that uses the configuration
          model and generators to produce sample datasets for both feeds.
        priority: high
        estimate: S
        depends_on: [M1-S3, M1-S8]
        acceptance_criteria:
          - CLI can be invoked with basic arguments (duration, events per minute, output format/path).
          - Running the CLI produces OrderEvent and CourierStatusEvent data in JSON and/or AVRO.
          - Errors are handled gracefully with clear messages.

      - id: M1-S10
        title: Write Milestone 1 README and design note
        description: >
          Document the feed design, schemas, generator behaviour,
          realism assumptions, and how Milestone 1 sets up Milestone 2
          analytics and dashboard.
        priority: medium
        estimate: S
        depends_on: [M1-S2, M1-S8, M1-S9]
        acceptance_criteria:
          - README.md describes project overview and how to run the generator.
          - Design note explains both feeds, field choices, and how they support analytics.
          - Realism and edge-case behaviour are clearly described.
          - Limitations and planned extensions for Milestone 2 are listed.

  - id: M2-E1
    name: Milestone 2 – Stream Ingestion, Processing & Storage
    milestone: 2
    goal: >
      Ingest the synthetic feeds into Azure Event Hubs, process them
      with Spark Structured Streaming (including event-time, watermarks,
      and windows), and store curated data at rest in Parquet on Azure
      Blob Storage.
    stories:
      - id: M2-S1
        title: Design Event Hubs topics and partitioning strategy
        description: >
          Decide topics, keys, partitions, and consumer groups for the
          two feeds to support throughput and analytics requirements.
        priority: high
        estimate: S
        acceptance_criteria:
          - Topic names and partition counts documented.
          - Partition keys (e.g., zone_id/order_id) justified.
          - Consumer group strategy described for processing jobs.

      - id: M2-S2
        title: Implement Spark Structured Streaming ingestion and parsing
        description: >
          Implement Structured Streaming jobs that read from Event Hubs,
          parse JSON/AVRO payloads, validate them against schemas, and
          build clean streaming DataFrames with proper event-time columns.
        priority: high
        estimate: M
        depends_on: [M2-S1]
        acceptance_criteria:
          - Streaming query consumes both feeds from Event Hubs.
          - Invalid records are handled (e.g., dead-letter or error logging).
          - Event-time columns and watermarks are defined.

      - id: M2-S3
        title: Implement windowed KPIs and curated Parquet storage
        description: >
          Implement tumbling or hopping windows for core KPIs and write
          curated results and detailed data to Parquet in Azure Blob
          Storage.
        priority: high
        estimate: M
        depends_on: [M2-S2]
        acceptance_criteria:
          - At least one tumbling or hopping window query over the feeds.
          - Parquet output in Blob Storage partitioned appropriately (e.g., by date/zone).
          - Queries can be re-run or inspected offline.

  - id: M2-E2
    name: Milestone 2 – Analytics, Metrics & Dashboard
    milestone: 2
    goal: >
      Implement Delivery Time Anomaly Score and Zone Stress Index, plus
      a live dashboard (e.g., Streamlit) that visualizes KPIs, anomalies,
      and health by zone and restaurant.
    stories:
      - id: M2-S4
        title: Implement Delivery Time Anomaly Score per zone
        description: >
          Implement a streaming computation that flags anomalous delivery
          times by comparing recent windows to historical patterns at
          zone level, with late data handling.
        priority: high
        estimate: M
        depends_on: [M2-S3]
        acceptance_criteria:
          - Anomaly score or flag computed per zone over recent windows.
          - Late data is handled using watermarks and appropriate joins.
          - Results are written to a table/view consumable by the dashboard.

      - id: M2-S5
        title: Implement Zone Stress Index (ZSI)
        description: >
          Implement a streaming metric that reflects current demand vs
          available courier supply per zone, highlighting overload zones.
        priority: high
        estimate: M
        depends_on: [M2-S3]
        acceptance_criteria:
          - ZSI metric defined as a function of pending orders and active couriers.
          - Zones are tagged as underloaded/normal/overloaded based on thresholds.
          - Metric is updated in near-real-time.

      - id: M2-S6
        title: Build live dashboard (Streamlit recommended)
        description: >
          Build a live dashboard that surfaces KPIs, anomaly scores, and
          ZSI with filters for zone and restaurant, plus a health view.
        priority: high
        estimate: M
        depends_on: [M2-S4, M2-S5]
        acceptance_criteria:
          - Dashboard shows live KPIs and time-series charts.
          - Users can filter by zone and restaurant.
          - Health view emphasizes SLA breaches, anomalies, and stressed zones.

      - id: M2-S7
        title: Write reflection and discussion summary
        description: >
          Summarize what was learned about streaming tradeoffs, how data
          was designed to enable analytics, and what would be needed for
          production readiness.
        priority: medium
        estimate: S
        depends_on: [M2-S6]
        acceptance_criteria:
          - Short written reflection covering tradeoffs (latency, correctness, cost).
          - Discussion of schema and feed design decisions.
          - List of improvements needed for production (reliability, scalability, observability, ops).

